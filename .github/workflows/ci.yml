name: CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # change if needed

      - name: Install dependencies
        run: npm install || echo "No dependencies to install"

      - name: Run build
        run: npm run build || echo "No build step, skipping"

      - name: Run tests
        run: npm test || echo "No tests, skipping"
